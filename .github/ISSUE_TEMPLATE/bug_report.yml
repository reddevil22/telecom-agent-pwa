name: Bug Report
description: Report a bug to help us improve
title: "[Bug]: "
labels: bug
assignees: ''
body:
  - type: markdown
    attributes:
      value: |
        ## Bug Description
        A clear description of the bug.

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should happen
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happens
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: Node version, OS, etc.
    validations:
      required: false