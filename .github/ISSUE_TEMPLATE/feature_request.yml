name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: enhancement
assignees: ''
body:
  - type: markdown
    attributes:
      value: |
        ## Feature Description
        A clear description of the feature you'd like to see.

  - type: textarea
    id: problem
    attributes:
      label: Problem It Solves
      placeholder: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      placeholder: How should it work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      placeholder: Any alternative approaches?
    validations:
      required: false